<!doctype html>

    <!-- Open Graph (English) -->
    <meta property="og:type" content="website" />

    <meta property="og:locale:alternate" content="ru_RU" />

    <!-- Multi-Regional Hreflang (Canonical: English .com) -->
    <link rel="canonical" href="https://simplex-cap.com/" />
    <link rel="alternate" hreflang="en" href="https://simplex-cap.com/" />
    <link rel="alternate" hreflang="ru" href="https://www.simplex-cap.ru/" />

    <title>Simplex Capital | Tech Venture Capital & Strategic Technology Investments</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/webp" sizes="192x192" href="/favicon-192.webp" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Preload LCP hero image for faster first paint -->
    <link rel="preload" as="image" href="/images/home.webp" fetchpriority="high" />

    <!-- Type system: Fraunces (display serif) / Inter (body, nav, labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      rel="stylesheet"
    />

    <!-- JSON-LD: Organization (Tech Venture Capital Fund) -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": ["Organization", "FinancialService"],
      "name": "Simplex Capital",
      "alternateName": ["Simplex Capital Fund", "Simplex Tech Ventures"],
      "url": "https://simplex-cap.com",
      "logo": "https://simplex-cap.com/images/logo3.png",
      "description": "Simplex Capital is a leading tech venture capital firm specializing in strategic technology investments in fast-growing tech startups and Series C/D companies. We invest in enterprise software, AI, cloud infrastructure, and fintech.",
      "sameAs": [
        "https://www.linkedin.com/company/simplex-capital"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KY",
        "streetAddress": "Cayman Islands"
      },
      "foundingDate": "2000",
      "knowsAbout": [
        "Tech Venture Capital",
        "Strategic Technology Investments",
        "Fast-Growing Tech Startups",
        "Private Equity",
        "Series C Funding",
        "Series D Funding",
        "Enterprise Software",
        "Cloud Infrastructure",
        "AI Investments",
        "FinTech",
        "Cybersecurity",
        "IPO Exits"
      ],
      "areaServed": ["US", "EU", "RU", "Global"],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Investor Relations",
        "url": "https://simplex-cap.com/Contact"
      }
    }
    </script>

    <!-- JSON-LD: WebSite (Tech Venture Capital Search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Simplex Capital",
      "url": "https://simplex-cap.com",
      "description": "Tech venture capital and strategic technology investments fund for fast-growing tech startups",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://simplex-cap.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: LocalBusiness (Tech VC Fund) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "telephone": "Contact via website",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "Cayman Islands"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "50"
      }
    }
